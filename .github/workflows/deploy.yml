name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    env:
      ALWAYSDATA_ACCOUNT: suqshobots
      ALWAYSDATA_HOST: ssh-suqshobots.alwaysdata.net
      ALWAYSDATA_SERVICE_ID: "22302"
      DEPLOY_PATH: /home/suqshobots/bots/suqshos-bot
      REPO_URL: https://github.com/sudhz/suqshos-bot.git
      BUN_BIN: /home/suqshobots/.bun/bin/bun
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.ALWAYSDATA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$ALWAYSDATA_HOST" >> ~/.ssh/known_hosts

      - name: Deploy code on alwaysdata
        run: |
          chmod +x scripts/deploy-remote.sh
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 "$ALWAYSDATA_ACCOUNT@$ALWAYSDATA_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' BUN_BIN='$BUN_BIN' sh -s" < scripts/deploy-remote.sh

      - name: Restart alwaysdata service
        run: |
          curl --fail --silent --show-error \
            --basic \
            --user "${{ secrets.ALWAYSDATA_API_TOKEN }} account=$ALWAYSDATA_ACCOUNT:" \
            --request POST \
            "https://api.alwaysdata.com/v1/service/$ALWAYSDATA_SERVICE_ID/restart/"

      - name: Create successful deployment record
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              auto_merge: false,
              required_contexts: [],
              description: "Deployed to alwaysdata",
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "success",
            });
